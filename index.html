<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陈建元 | 核心稳定器</title>
    <style>
        :root {
            --apple-bg: #000;
            --apple-text: #f5f5f7;
            --accent: #2997ff;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--apple-bg);
            color: var(--apple-text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            user-select: none;
        }
        canvas { display: block; cursor: crosshair; }
        
        /* UI 盖层 */
        #ui {
            position: absolute; top: 40px; text-align: center; pointer-events: none;
        }
        #score { font-size: 4rem; font-weight: 200; letter-spacing: -2px; }
        #msg { font-size: 1rem; color: #86868b; text-transform: uppercase; letter-spacing: 2px; }
        
        /* 引导提示 */
        #hint {
            position: absolute; bottom: 40px; color: #444; font-size: 0.8rem;
        }

        /* 游戏结束弹窗 */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100;
        }
        #overlay h2 { font-size: 3rem; margin-bottom: 10px; }
        button {
            background: var(--apple-text); border: none; padding: 12px 30px;
            border-radius: 20px; font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        button:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <div id="ui">
        <div id="msg">Stability Level</div>
        <div id="score">0</div>
    </div>

    <div id="hint">点击/空格 切换核心旋转方向以吸收同色粒子</div>

    <div id="overlay">
        <h2 id="final-score">SCORE: 0</h2>
        <p style="margin-bottom: 20px; color: #86868b;">核心已失控</p>
        <button onclick="resetGame()">重新初始化</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const overlay = document.getElementById('overlay');
        const finalScoreEl = document.getElementById('final-score');

        let width, height, score, gameActive, core;
        let particles = [];
        let sparks = [];

        class Core {
            constructor() {
                this.radius = 50;
                this.angle = 0;
                this.rotationSpeed = 0.05;
                this.direction = 1; // 1 为顺时针，-1 为逆时针
                this.color = '#fff';
            }
            update() {
                this.angle += this.rotationSpeed * this.direction;
                // 动态改变核心颜色体现机械质感
                this.color = this.direction === 1 ? '#2997ff' : '#ff3b30';
            }
            draw() {
                ctx.save();
                ctx.translate(width/2, height/2);
                ctx.rotate(this.angle);
                
                // 绘制核心外环
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;
                ctx.stroke();

                // 绘制核心刻度（机械感）
                for(let i=0; i<4; i++) {
                    ctx.rotate(Math.PI / 2);
                    ctx.fillStyle = this.color;
                    ctx.fillRect(this.radius - 10, -2, 15, 4);
                }
                ctx.restore();
            }
        }

        class Enemy {
            constructor() {
                const side = Math.floor(Math.random() * 4);
                this.radius = 5;
                this.type = Math.random() > 0.5 ? 1 : -1; // 1为蓝，-1为红
                this.color = this.type === 1 ? '#2997ff' : '#ff3b30';
                
                if(side === 0) { this.x = Math.random()*width; this.y = -20; }
                else if(side === 1) { this.x = width+20; this.y = Math.random()*height; }
                else if(side === 2) { this.x = Math.random()*width; this.y = height+20; }
                else { this.x = -20; this.y = Math.random()*height; }

                const angle = Math.atan2(height/2 - this.y, width/2 - this.x);
                const speed = 2 + (score / 10);
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        function createSparks(x, y, color) {
            for(let i=0; i<8; i++) {
                sparks.push({
                    x, y, 
                    vx: (Math.random()-0.5)*10, 
                    vy: (Math.random()-0.5)*10,
                    life: 1.0,
                    color
                });
            }
        }

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            score = 0;
            gameActive = true;
            particles = [];
            sparks = [];
            core = new Core();
            scoreEl.innerText = score;
            overlay.style.display = 'none';
        }

        function resetGame() {
            init();
            animate();
        }

        function animate() {
            if(!gameActive) return;
            requestAnimationFrame(animate);
            
            // Apple 式的残影效果
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, width, height);

            core.update();
            core.draw();

            // 生成敌人
            if(Math.random() < 0.03 + (score/2000)) {
                particles.push(new Enemy());
            }

            // 处理敌人粒子
            for(let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                p.draw();

                // 碰撞检测
                const dist = Math.hypot(p.x - width/2, p.y - height/2);
                if(dist < core.radius + 5) {
                    if(p.type === core.direction) {
                        // 匹配成功
                        score++;
                        scoreEl.innerText = score;
                        createSparks(p.x, p.y, p.color);
                        particles.splice(i, 1);
                    } else {
                        // 匹配失败 - 结束
                        gameActive = false;
                        finalScoreEl.innerText = `SCORE: ${score}`;
                        overlay.style.display = 'flex';
                    }
                }
            }

            // 处理火花
            for(let i = sparks.length - 1; i >= 0; i--) {
                const s = sparks[i];
                s.x += s.vx; s.y += s.vy;
                s.life -= 0.02;
                ctx.beginPath();
                ctx.arc(s.x, s.y, 2, 0, Math.PI*2);
                ctx.fillStyle = `rgba(${s.color === '#2997ff' ? '41,151,255' : '255,59,48'}, ${s.life})`;
                ctx.fill();
                if(s.life <= 0) sparks.splice(i, 1);
            }
        }

        // 交互逻辑
        const handleAction = () => {
            if(gameActive) core.direction *= -1;
        };

        window.addEventListener('mousedown', handleAction);
        window.addEventListener('keydown', (e) => { if(e.code === 'Space') handleAction(); });
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        init();
        animate();
    </script>
</body>
</html>
