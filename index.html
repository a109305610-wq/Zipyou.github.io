<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人主页</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
}

body {
    background: #0f0f10;
    color: #fff;
    overflow-x: hidden;
}

/* 顶部 */
header {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

h1 {
    font-size: 60px;
    font-weight: 600;
    letter-spacing: 2px;
}

.subtitle {
    margin-top: 15px;
    font-size: 18px;
    color: #aaa;
}

/* 分区 */
.section {
    padding: 80px 10%;
}

/* 照片墙 */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
}

.gallery img {
    width: 100%;
    height: 300px;
    object-fit: cover;
    border-radius: 12px;
    transition: 0.4s;
    cursor: pointer;
}

.gallery img:hover {
    transform: scale(1.05);
}

/* 放大查看 */
.preview {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    display: none;
    justify-content: center;
    align-items: center;
}

.preview img {
    max-width: 80%;
    max-height: 80%;
    border-radius: 10px;
}

/* 页脚 */
footer {
    text-align: center;
    padding: 40px;
    color: #777;
}

/* 动画 */
.fade-in {
    opacity: 0;
    transform: translateY(30px);
    transition: 1s;
}

.fade-in.show {
    opacity: 1;
    transform: translateY(0);
}
</style>

</head>
<body>

<header>
    <div>
        <h1>你好，我是 陈建元</h1>
        <div class="subtitle">极简 | 高级 | 个人展示</div>
    </div>
</header>

<section class="section fade-in">
    <h2 style="margin-bottom:20px;">关于我</h2>
    <p style="color:#aaa; line-height:1.8;">
        这里写你的个人介绍，比如：大三机械专业 / 热爱科技 / 正在探索AI与互联网。
    </p>
</section>

<section class="section fade-in">
    <h2 style="margin-bottom:20px;">我的照片</h2>
    <div class="gallery">
        <img src="https://picsum.photos/500/600?1">
        <img src="https://picsum.photos/500/600?2">
        <img src="https://picsum.photos/500/600?3">
        <img src="https://picsum.photos/500/600?4">
        <img src="https://picsum.photos/500/600?5">
        <img src="https://picsum.photos/500/600?6">
    </div>
</section>

<div class="preview" id="preview">
    <img src="" id="previewImg">
</div>

<footer>
    © 2026 王峰 - Personal Page
</footer>

<script>
// 图片点击放大
const images = document.querySelectorAll('.gallery img');
const preview = document.getElementById('preview');
const previewImg = document.getElementById('previewImg');

images.forEach(img => {
    img.onclick = () => {
        preview.style.display = 'flex';
        previewImg.src = img.src;
    }
});

preview.onclick = () => {
    preview.style.display = 'none';
};

// 滚动动画
const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add('show');
        }
    });
});

document.querySelectorAll('.fade-in').forEach(el => {
    observer.observe(el);
});
</script>

</body>
</html>
