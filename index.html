<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的高端个人主页</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #f5f5f7;
            --accent-color: #2997ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "SF Pro Text", "SF Pro Icons", "Helvetica Neue", "Helvetica", "Arial", "PingFang SC", sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 粒子背景容器 */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            background-color: #000000;
        }

        /* 磨砂玻璃导航栏 (Apple 风格) */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            height: 60px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 40px;
        }

        nav a {
            color: #f5f5f7;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: var(--accent-color);
        }

        /* 各个区块通用样式 */
        section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 100px 20px;
            text-align: center;
        }

        /* 首屏 Hero Section */
        h1 {
            font-size: 5rem;
            font-weight: 600;
            letter-spacing: -0.05em;
            background: linear-gradient(90deg, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        p.subtitle {
            font-size: 1.5rem;
            color: #86868b;
            max-width: 600px;
            line-height: 1.5;
        }

        /* 个人简介区块 */
        .profile-pic {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(255,255,255,0.1);
            transition: transform 0.5s ease;
        }

        .profile-pic:hover {
            transform: scale(1.05);
        }

        .bio-text {
            font-size: 1.2rem;
            color: #a1a1a6;
            max-width: 800px;
            line-height: 1.8;
            margin: 20px auto;
        }

        /* 滚动出现动画 (核心亮点) */
        .reveal {
            opacity: 0;
            transform: translateY(80px);
            transition: all 1.2s cubic-bezier(0.5, 0, 0, 1);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* 音乐控制按钮 */
        .music-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 12px;
            cursor: pointer;
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        .music-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.1);
        }

        .music-btn.playing {
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            h1 { font-size: 3rem; }
            nav ul { gap: 20px; }
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <audio id="bgMusic" loop>
        <source src="YOUR_AUDIO_URL.mp3" type="audio/mpeg">
    </audio>

    <button class="music-btn" id="musicToggle" onclick="toggleMusic()">🎵 播放</button>

    <nav>
        <ul>
            <li><a href="#home">首页</a></li>
            <li><a href="#about">关于我</a></li>
            <li><a href="#gallery">影像</a></li>
            <li><a href="#contact">联系</a></li>
        </ul>
    </nav>

    <section id="home">
        <h1 class="reveal">突破界限。<br>探索未知。</h1>
        <p class="subtitle reveal" style="transition-delay: 0.2s;">欢迎来到我的数字宇宙。极致体验，由此开启。</p>
    </section>

    <section id="about">
        <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?q=80&w=500&auto=format&fit=crop" alt="我的照片" class="profile-pic reveal">
        <h2 class="reveal" style="font-size: 2.5rem; margin-bottom: 20px;">你好，我是 [你的名字]</h2>
        <p class="bio-text reveal">
            我是一名充满热情的创作者，致力于在数字世界中寻找美与逻辑的平衡。<br>
            像 Apple 一样，我追求极致的细节与极简的哲学。<br>
            在这个充满噪音的世界里，我希望用纯粹的作品传递力量。
        </p>
    </section>

    <section id="gallery">
        <h2 class="reveal" style="font-size: 3rem; margin-bottom: 40px;">捕捉瞬间，定格永恒。</h2>
        <div style="display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;" class="reveal">
            <div style="width: 300px; height: 400px; background: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=400&auto=format&fit=crop') center/cover; border-radius: 20px;"></div>
            <div style="width: 300px; height: 400px; background: url('https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=400&auto=format&fit=crop') center/cover; border-radius: 20px;"></div>
            <div style="width: 300px; height: 400px; background: url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=400&auto=format&fit=crop') center/cover; border-radius: 20px;"></div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script>
        // 1. 初始化粒子特效 (高端连线效果)
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#ffffff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5, "random": false },
                "size": { "value": 3, "random": true },
                "line_linked": {
                    "enable": true,
                    "distance": 150,
                    "color": "#ffffff",
                    "opacity": 0.2,
                    "width": 1
                },
                "move": {
                    "enable": true,
                    "speed": 2,
                    "direction": "none",
                    "random": false,
                    "straight": false,
                    "out_mode": "out",
                    "bounce": false,
                }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": { "enable": true, "mode": "grab" },
                    "onclick": { "enable": true, "mode": "push" },
                    "resize": true
                },
                "modes": {
                    "grab": { "distance": 140, "line_linked": { "opacity": 1 } },
                    "push": { "particles_nb": 4 }
                }
            },
            "retina_detect": true
        });

        // 2. 滚动出现动画 (Intersection Observer 监听元素进入视口)
        function reveal() {
            var reveals = document.querySelectorAll(".reveal");
            for (var i = 0; i < reveals.length; i++) {
                var windowHeight = window.innerHeight;
                var elementTop = reveals[i].getBoundingClientRect().top;
                var elementVisible = 100; // 元素距离底部多少距离时触发动画
                if (elementTop < windowHeight - elementVisible) {
                    reveals[i].classList.add("active");
                }
            }
        }
        window.addEventListener("scroll", reveal);
        reveal(); // 初始化触发一次

        // 3. 背景音乐控制 (现代浏览器要求必须有用户交互才能播放声音)
        var bgMusic = document.getElementById("bgMusic");
        var musicToggleBtn = document.getElementById("musicToggle");
        var isPlaying = false;

        function toggleMusic() {
            if (isPlaying) {
                bgMusic.pause();
                musicToggleBtn.innerHTML = "🎵 播放";
                musicToggleBtn.classList.remove("playing");
            } else {
                bgMusic.play().catch(e => alert("请先在代码中替换 YOUR_AUDIO_URL.mp3 为真实的音乐地址哦！"));
                musicToggleBtn.innerHTML = "🎵 暂停";
                musicToggleBtn.classList.add("playing");
            }
            isPlaying = !isPlaying;
        }
    </script>
</body>
</html>
