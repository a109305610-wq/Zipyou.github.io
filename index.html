<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jianyuan Adventure | 移动版闯关</title>
    <style>
        :root {
            --apple-blue: #0071e3;
            --glass: rgba(255, 255, 255, 0.2);
        }
        body {
            margin: 0; padding: 0; overflow: hidden;
            background: #87CEEB; /* 经典的马里奥天空蓝 */
            font-family: -apple-system, sans-serif;
        }
        canvas { display: block; background: linear-gradient(#87CEEB, #E0F6FF); }

        /* 移动端虚拟按键 */
        .controls {
            position: fixed; bottom: 30px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; align-items: flex-end;
            pointer-events: none; z-index: 100;
        }
        .d-pad { display: flex; gap: 15px; pointer-events: auto; }
        .btn {
            width: 70px; height: 70px;
            background: var(--glass); backdrop-filter: blur(10px);
            border-radius: 50%; border: 2px solid rgba(255,255,255,0.3);
            display: flex; justify-content: center; align-items: center;
            color: white; font-size: 24px; font-weight: bold;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .btn:active { background: rgba(255,255,255,0.4); transform: scale(0.9); }
        .jump-btn { width: 90px; height: 90px; pointer-events: auto; background: rgba(0, 113, 227, 0.4); }

        #score-board {
            position: fixed; top: 20px; left: 20px;
            color: white; font-size: 20px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="score-board">COINS: <span id="score">0</span></div>

    <div class="controls">
        <div class="d-pad">
            <div class="btn" id="leftBtn">←</div>
            <div class="btn" id="rightBtn">→</div>
        </div>
        <div class="btn jump-btn" id="jumpBtn">UP</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        // 游戏配置
        let width, height;
        let score = 0;
        const gravity = 0.8;
        const friction = 0.85;

        const player = {
            x: 100, y: 0,
            width: 40, height: 40,
            velX: 0, velY: 0,
            speed: 5, jumpStrength: 15,
            grounded: false,
            color: "#FF3B30" // Apple Red
        };

        const keys = { left: false, right: false, up: false };
        let platforms = [];
        let coins = [];
        let cameraX = 0;

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;

            // 初始化关卡 (地板和平台)
            platforms = [
                { x: 0, y: height - 60, w: 3000, h: 60 }, // 地板
                { x: 400, y: height - 200, w: 150, h: 20 },
                { x: 650, y: height - 350, w: 150, h: 20 },
                { x: 900, y: height - 250, w: 200, h: 20 },
                { x: 1200, y: height - 400, w: 150, h: 20 },
                { x: 1500, y: height - 200, w: 300, h: 20 },
            ];

            // 放置一些金币
            coins = [
                { x: 450, y: height - 250, collected: false },
                { x: 680, y: height - 400, collected: false },
                { x: 950, y: height - 300, collected: false },
                { x: 1550, y: height - 250, collected: false },
            ];
        }

        // 手机触控监听
        const bindTouch = (id, key) => {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
        };
        bindTouch('leftBtn', 'left');
        bindTouch('rightBtn', 'right');
        bindTouch('jumpBtn', 'up');

        function update() {
            // 左右移动逻辑
            if (keys.right) {
                if (player.velX < player.speed) player.velX++;
            }
            if (keys.left) {
                if (player.velX > -player.speed) player.velX--;
            }

            player.velX *= friction;
            player.velY += gravity;

            // 预更新位置用于碰撞检测
            player.grounded = false;
            for (let plat of platforms) {
                // 简单的 AABB 碰撞检测
                if (player.x < plat.x + plat.w &&
                    player.x + player.width > plat.x &&
                    player.y + player.height <= plat.y &&
                    player.y + player.height + player.velY >= plat.y) {
                    player.velY = 0;
                    player.y = plat.y - player.height;
                    player.grounded = true;
                }
            }

            // 跳跃
            if (keys.up && player.grounded) {
                player.velY = -player.jumpStrength;
                player.grounded = false;
            }

            player.x += player.velX;
            player.y += player.velY;

            // 边界检查
            if (player.x < 0) player.x = 0;

            // 相机跟随 (保持玩家在屏幕中央附近)
            if (player.x > width / 2) {
                cameraX = player.x - width / 2;
            }

            // 金币收集
            coins.forEach(coin => {
                if (!coin.collected && 
                    Math.hypot(player.x + 20 - coin.x, player.y + 20 - coin.y) < 30) {
                    coin.collected = true;
                    score += 10;
                    scoreEl.innerText = score;
                }
            });
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            ctx.save();
            ctx.translate(-cameraX, 0); // 应用相机偏移

            // 画地板和平台 (带有磨砂质感)
            ctx.fillStyle = "#5D4037"; // 土地颜色
            platforms.forEach(plat => {
                ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
                // 给平台加个绿草顶
                ctx.fillStyle = "#4CAF50";
                ctx.fillRect(plat.x, plat.y, plat.w, 10);
                ctx.fillStyle = "#5D4037";
            });

            // 画金币
            ctx.fillStyle = "#FFD700";
            coins.forEach(coin => {
                if (!coin.collected) {
                    ctx.beginPath();
                    ctx.arc(coin.x, coin.y, 10, 0, Math.PI * 2);
                    ctx.fill();
                    // 加个光泽
                    ctx.fillStyle = "white";
                    ctx.fillRect(coin.x - 3, coin.y - 5, 2, 5);
                    ctx.fillStyle = "#FFD700";
                }
            });

            // 画玩家 (一个带表情的高端小方块)
            ctx.fillStyle = player.color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = "rgba(0,0,0,0.2)";
            ctx.fillRect(player.x, player.y, player.width, player.height);
            // 眼睛
            ctx.fillStyle = "white";
            ctx.fillRect(player.x + 25, player.y + 10, 8, 8);
            
            ctx.restore();

            update();
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init();
        draw();
    </script>
</body>
</html>
